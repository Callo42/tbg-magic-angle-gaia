        "provenance_source": "lkm",
        "lkm_original": "When transport measured versus temperature at gate-induced carrier density equal to nominal half-filling of the moiré flat band ($n=\\pm n_s/2$) displays insulating temperature dependence (resistance that increases upon cooling) over an intermediate temperature range (here roughly 1–4 K), this phenomenology is consistent with the presence of a correlated insulating state driven by electron–electron interactions (a Mott-like insulator) under the assumption that single-particle band gaps or disorder-dominated localization do not fully account for the observed gap magnitude and temperature dependence; this interpretation is plausible in light of the very narrow flat-band bandwidth (of order 5–10 meV) and the enhanced Coulomb interaction energy in magic-angle twisted bilayer graphene, but does not constitute a rigorous microscopic proof of a Mott mechanism.",
