[project]
name = "substrate-chern-flat-band-gaia"
version = "0.1.0"
description = "Gaia knowledge package generated from LKM evidence chains for substrate-induced Chern flat bands in magic-angle TBG."
requires-python = ">=3.12"

[tool.gaia]
namespace = "github"
type = "knowledge-package"
uuid = "fd951e88-e5d6-4ddd-a71b-30cea9af00aa"
generated_by = "lkm-to-gaia"
generated_from_search = "targeted Turn-2 selected root gcn_9f7dbaf8f0014316 for TBG-on-TMD reconstructed Chern flat bands"
generated_from_roots = ["gcn_9f7dbaf8f0014316"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/substrate_chern_flat_band"]
