[project]
name = "tbg-magic-angle-gaia"
version = "0.1.0"
description = "Gaia knowledge package regenerated from one BM velocity root and connected LKM-backed TBG magic-angle extensions."
requires-python = ">=3.12"

[tool.gaia]
namespace = "github"
type = "knowledge-package"
uuid = "f1965703-1a57-4a66-8a3f-6fc6413c09d7"
generated_by = "lkm-to-gaia"
generated_from_search = "May 4 BM velocity root plus connected TBG magic-angle extensions"
generated_from_roots = ["gcn_7bca73ad98eb4ed4"]
generated_from_extensions = ["gcn_93c279f20f364a40", "gcn_feace4c9a0154885", "gcn_a0ab3201de0e41ad", "gcn_848085b12d384915", "gcn_5f58746bcc0b4098", "gcn_c220df1acc8b476a", "gcn_de1d329f326f4e75", "gcn_afdfbd0c013048d8", "gcn_8159f32dda354258"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tbg_magic_angle"]
